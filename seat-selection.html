<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Selection - CinePass</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="seat.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        /* Small necessary utility overrides that don't belong in seat.css */
        body { padding-top: 100px; }
        .legend-container {
            background: rgba(255, 255, 255, 0.02);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top px-4">
        <a class="navbar-brand fw-bold fs-3" href="index.html">Cine<span class="text-info">Pass</span></a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="details.html?id=27205">Movies</a></li>
            </ul>
        </div>
    </nav>

    <div class="container py-4">
        <div class="text-center">
            <h1 class="movie-title text-uppercase">INCEPTION</h1>
            <p class="text-info opacity-75">Grand Cinema | Screen 4 | 05:00 PM</p>
        </div>

        <div class="screen-wrapper text-center">
            <div class="screen-glow"></div>
            <p class="screen-label">SCREEN THIS WAY</p>
        </div>

        <div class="d-flex justify-content-center gap-4 mb-5">
            <div class="legend-container d-flex gap-4 shadow">
                <div class="d-flex align-items-center gap-2">
                    <div class="seat available"></div> <span class="small">Available</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <div class="seat selected"></div> <span class="small">Selected</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <div class="seat occupied"></div> <span class="small">Occupied</span>
                </div>
            </div>
        </div>

        <div class="text-center">
            <div class="theater-container">
                <script>
                    const rows = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];
                    rows.forEach((rowLetter, rowIndex) => {
                        document.write('<div class="seat-row">');
                        document.write(`<div class="row-label">${rowLetter}</div>`);
                        for(let i=1; i<=10; i++) {
                            let status = (Math.random() > 0.85) ? 'occupied' : 'available';
                            if(i === 6) document.write('<div class="aisle"></div>');
                            
                            // Visual flair for back couple of rows
                            let vipClass = (rowIndex >= 8) ? ' vip-border' : '';
                            
                            document.write(`<div class="seat ${status}${vipClass}" data-row="${rowLetter}" data-seat="${i}">${status === 'occupied' ? '' : i}</div>`);
                        }
                        document.write('</div>');
                    });
                </script>
            </div>
        </div>
    </div>

    <div class="booking-bar">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <span class="label">SUBTOTAL</span>
                <h3 class="amount text-white mb-0">$<span id="price-display">0.00</span></h3>
            </div>
            <div class="text-center">
                <span class="label">SEATS</span>
                <h4 class="text-info amount mb-0" id="seat-display" style="font-size: 1.2rem;">None Selected</h4>
            </div>
            <button class="btn-pay shadow">
                PAYMENT →
            </button>
        </div>
    </div>

    <script>
        // Navbar scroll effect
        window.addEventListener('scroll', function () {
            const nav = document.querySelector('.navbar');
            if (window.scrollY > 20) {
                nav.style.background = '#05080a';
                nav.style.borderBottom = '1px solid #222';
            } else {
                nav.style.background = 'linear-gradient(to bottom, rgba(15, 23, 30, 0.9), rgba(15, 23, 30, 0))';
                nav.style.borderBottom = 'none';
            }
        });

        // Dynamic Seat Selection Logic
        const seatPrice = 15.00; // Fixed price per seat
        let selectedSeatsCount = 0;
        let selectedSeatNumbers = [];

        const updateBookingBar = () => {
            const priceDisplay = document.getElementById('price-display');
            const seatDisplay = document.getElementById('seat-display');
            
            priceDisplay.textContent = (selectedSeatsCount * seatPrice).toFixed(2);
            
            if (selectedSeatsCount === 0) {
                seatDisplay.textContent = 'None Selected';
            } else {
                seatDisplay.textContent = selectedSeatNumbers.join(', ');
            }
        };

        document.querySelectorAll('.seat.available').forEach(seat => {
            seat.addEventListener('click', () => {
                const row = seat.getAttribute('data-row');
                const seatNum = seat.getAttribute('data-seat');
                const seatId = `${row}${seatNum}`;

                seat.classList.toggle('selected');
                seat.classList.toggle('available');

                // If it became selected (so it now has 'selected' class)
                if (seat.classList.contains('selected')) {
                    selectedSeatsCount++;
                    selectedSeatNumbers.push(seatId);
                } else {
                    selectedSeatsCount--;
                    selectedSeatNumbers = selectedSeatNumbers.filter(id => id !== seatId);
                }
                updateBookingBar();
            });
        });
    </script>
</body>
</html>
