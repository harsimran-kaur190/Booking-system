<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePass | Premium Seat Selection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="seat.css">
</head>
<body>

    <div class="container py-5 text-center">
        <header class="mb-5">
            <h1 class="movie-title">INCEPTION</h1>
            <p class="text-info opacity-75">IMAX EXPERIENCE • SCREEN 04 • 05:00 PM</p>
        </header>

        <div class="screen-wrapper">
            <div class="screen-glow"></div>
            <p class="screen-label">SCREEN</p>
        </div>

        <div class="d-flex justify-content-center gap-4 mb-4">
            <div class="legend-item"><div class="seat available"></div> Available ($15)</div>
            <div class="legend-item"><div class="seat available vip-border"></div> VIP ($25)</div>
            <div class="legend-item"><div class="seat occupied"></div> Occupied</div>
        </div>

        <div class="theater-container shadow-lg" id="theater-grid">
            </div>
    </div>

    <footer class="booking-bar">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <span class="label">TOTAL PRICE</span>
                <h2 class="amount">$<span id="total-price">0.00</span></h2>
            </div>
            <div class="text-center">
                <span class="label">SELECTED SEATS</span>
                <h5 class="text-info mb-0" id="selected-list">None</h5>
            </div>
            <button class="btn-pay">PAYMENT →</button>
        </div>
    </footer>

    <script>
        const grid = document.getElementById('theater-grid');
        const rows = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];
        const vipRows = ['K', 'L'];
        let selected = [];

        rows.forEach((row, rowIndex) => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'seat-row';
            rowDiv.innerHTML = `<div class="row-label">${row}</div>`;

            for (let i = 1; i <= 14; i++) {
                if (i === 8) rowDiv.innerHTML += '<div class="aisle"></div>';

                // Systematic Logic: Center-back seats (Rows F-J, Cols 5-10) are usually taken first
                const distFromCenter = Math.abs(7.5 - i) + Math.abs(6 - rowIndex);
                const isOccupied = Math.random() < (1.1 - (distFromCenter / 10));

                const isVIP = vipRows.includes(row);
                const status = isOccupied ? 'occupied' : 'available';
                const vipClass = isVIP ? 'vip-border' : '';

                rowDiv.innerHTML += `<div class="seat ${status} ${vipClass}" 
                    data-id="${row}${i}" data-price="${isVIP ? 25 : 15}"></div>`;
            }
            grid.appendChild(rowDiv);
        });

        // Event Delegation for better performance
        grid.addEventListener('click', (e) => {
            if (e.target.classList.contains('available') || e.target.classList.contains('selected')) {
                const seat = e.target;
                seat.classList.toggle('selected');
                const id = seat.dataset.id;
                const price = parseInt(seat.dataset.price);

                if (seat.classList.contains('selected')) {
                    selected.push({id, price});
                } else {
                    selected = selected.filter(s => s.id !== id);
                }
                
                document.getElementById('total-price').innerText = selected.reduce((a, b) => a + b.price, 0).toFixed(2);
                document.getElementById('selected-list').innerText = selected.map(s => s.id).join(', ') || 'None';
            }
        });
    </script>
</body>
</html>
