<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePass | Luxury Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="seat.css">
</head>
<body class="dark-theme">
    
    <nav class="navbar navbar-expand-lg fixed-top px-4">
        <a class="navbar-brand fw-bold fs-3" href="#">Cine<span class="text-info">Pass</span></a>
        <div class="ms-auto d-flex align-items-center">
            <span class="me-2 small opacity-75"><i class="bi bi-sun-fill"></i></span>
            <div class="form-check form-switch theme-switch">
                <input class="form-check-input" type="checkbox" id="themeToggle" checked>
            </div>
            <span class="ms-1 small opacity-75"><i class="bi bi-moon-stars-fill"></i></span>
        </div>
    </nav>

    <div class="container seat-page-wrapper">
        <div class="text-center mb-4">
            <h1 class="movie-title fw-bold">INCEPTION</h1>
            <p class="subtitle text-uppercase opacity-50">Standard Rows (A-J) • Luxury Recliners (K-L)</p>
        </div>

        <div class="screen-container">
            <div class="screen-glow"></div>
            <p class="screen-label mt-2">SCREEN THIS WAY</p>
        </div>

        <div class="legend-box d-flex justify-content-center gap-4 mb-5 shadow-sm">
            <div class="legend-item"><div class="seat available"></div><span>Available</span></div>
            <div class="legend-item"><div class="seat selected"></div><span>Selected</span></div>
            <div class="legend-item"><div class="seat occupied"></div><span>Sold Out</span></div>
            <div class="legend-item"><div class="seat available vip-border"></div><span>VIP Recliner</span></div>
        </div>

        <div class="theater-wrapper">
            <div id="seat-container" class="theater-grid">
                </div>
        </div>
    </div>

    <div class="booking-bar">
        <div class="container booking-grid">
            <div class="price-section">
                <span class="label small opacity-75">SUBTOTAL</span>
                <h3 class="amount mb-0 fw-bold">$<span id="total-price">0.00</span></h3>
            </div>

            <div class="selected-info text-center">
                <span class="label small opacity-75 d-block">SELECTED SEATS</span>
                <div id="selected-seats-list" class="fw-bold">None</div>
            </div>

            <div class="action-section text-end">
                <button class="btn btn-info btn-pay px-5 py-3 fw-bold shadow">
                    BOOK TICKETS <i class="bi bi-ticket-perforated ms-2"></i>
                </button>
            </div>
        </div>
    </div>
    <div class="modal fade" id="bookingModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white border-info shadow-lg">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">ORDER CONFIRMED</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body py-4">
                <div class="d-flex justify-content-between mb-3">
                    <span class="opacity-75">Movie:</span>
                    <span class="fw-bold text-info">INCEPTION</span>
                </div>
                <div class="d-flex justify-content-between mb-3">
                    <span class="opacity-75">Selected Seats:</span>
                    <span id="modal-seats" class="fw-bold text-info">-</span>
                </div>
                <hr class="opacity-25">
                <div class="d-flex justify-content-between fs-4">
                    <span class="fw-bold">Total:</span>
                    <span class="fw-bold text-info">$<span id="modal-total">0.00</span></span>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-outline-light w-100 py-3 fw-bold" data-bs-dismiss="modal">CANCEL</button>
                <button type="button" class="btn btn-info w-100 py-3 fw-bold shadow" onclick="confirmPurchase()">CONFIRM</button>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="script.js"></script>
</body>
</html>
