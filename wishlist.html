<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - CinePass</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark text-white">
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top px-4" style="background: #05080a;">
        <a class="navbar-brand fw-bold fs-3" href="index.html">Cine<span class="text-info">Pass</span></a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html#movies">Movies</a></li>
                <li class="nav-item"><a class="nav-link" href="theatres.html">Theatres</a></li>
                <li class="nav-item"><a class="nav-link active" href="wishlist.html">Wishlist</a></li>
            </ul>

            <form class="d-flex">
                <input class="form-control me-2 bg-dark text-white border-secondary" type="search"
                    placeholder="Search movies...">
                <button class="btn btn-info" type="submit" id="search">Search</button>
            </form>
        </div>
    </nav>

    <div class="container" style="padding-top: 120px;">
        <div class="row mb-5">
            <div class="col-12">
                <h2 class="fw-bold mb-0">My <span class="text-info">Wishlist</span></h2>
                <p class="text-secondary">Your curated collection of must-watch movies</p>
                <hr class="border-secondary opacity-25">
            </div>
        </div>

        <div id="wishlist-container" class="row g-4">
            <div class="col-12 text-center py-5" id="loader">
                <div class="spinner-border text-info" role="status"></div>
                <p class="mt-3 text-secondary text-uppercase tracking-widest small">Loading your favorites...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/wishlist.js"></script>
</body>

</html>
