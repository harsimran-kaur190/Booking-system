<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CinePass | Theatres</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      background-color: #000 !important;
      color: white;
      font-family: 'Inter', sans-serif;
    }

    .navbar {
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(8px);
    }

    .hero {
      padding: 120px 0 60px;
      text-align: center;
    }

    .hero h1 {
      font-weight: 700;
      font-size: 2.5rem;
    }

    .container {
      background: transparent !important;
    }

    #map {
      height: 350px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(13, 202, 240, 0.3);
    }

    .card {
      background: #0a0a0a;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 0 25px rgba(13, 202, 240, 0.4);
    }

    .tag {
      font-size: 12px;
      background: #0dcaf0;
      color: black;
      padding: 4px 10px;
      border-radius: 20px;
      margin-right: 5px;
    }

    .btn-info {
      border-radius: 20px;
      transition: 0.3s;
    }

    .btn-info:hover {
      box-shadow: 0 0 10px #0dcaf0;
    }

    h5::after {
      content: '';
      display: block;
      width: 40px;
      height: 3px;
      background: #0dcaf0;
      margin-top: 6px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark fixed-top px-4">
  <a class="navbar-brand fw-bold fs-4" href="index.html">
    Cine<span class="text-info">Pass</span>
  </a>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="container">
    <h1>Find Theatres Near You 🎬</h1>
    <p class="text-secondary">Simple, fast and cute experience</p>
  </div>
</section>

<!-- MAP -->
<div class="container mb-5">
  <h5 class="mb-3">Map View</h5>
  <div id="map"></div>
</div>

<!-- THEATRES -->
<div class="container mb-5">
  <h5 class="mb-3">Popular Theatres</h5>

  <div class="row g-3">

    <div class="col-md-4">
      <div class="card p-3">
        <h6>PVR Elante</h6>
        <p class="text-secondary small">Chandigarh</p>
        <div>
          <span class="tag">IMAX</span>
          <span class="tag">Recliner</span>
        </div>
        <a href="details.html" class="btn btn-info btn-sm mt-3">Book</a>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3">
        <h6>Cinepolis</h6>
        <p class="text-secondary small">Mohali</p>
        <div>
          <span class="tag">Dolby</span>
          <span class="tag">Snacks</span>
        </div>
        <a href="details.html" class="btn btn-info btn-sm mt-3">Book</a>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3">
        <h6>Wave Cinemas</h6>
        <p class="text-secondary small">Zirakpur</p>
        <div>
          <span class="tag">Luxury</span>
          <span class="tag">Parking</span>
        </div>
        <a href="details.html" class="btn btn-info btn-sm mt-3">Book</a>
      </div>
    </div>

  </div>
</div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="js/theatres.js"></script>

</body>
</html>
